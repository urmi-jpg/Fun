<!DOCTYPE html>
<html>
<head>
    <title>Hangout?</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }
        button {
            padding: 15px 25px;
            font-size: 18px;
            margin: 10px;
            position: absolute;
        }
        #yes {
            position: static;
        }
    </style>
</head>

<body>
    <h1>Do you want to hang out with me? 😄</h1>

    <button id="yes" onclick="alert('Yay! Let’s go 🎉')">Yes</button>
    <button id="no">No</button>

    <script>
        const noBtn = document.getElementById("no");

        noBtn.addEventListener("mouseover", () => {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;

            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        });
    </script>
</body>
</html>
