<!DOCTYPE html>
<html>
<head>
    <title>Hangout with me?</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #800020, #a8324a);
            color: white;
            overflow: hidden;
        }

        h1 {
            margin-top: 120px;
            font-size: 36px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 15px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        #yes {
            background-color: #ff4d6d;
            color: white;
        }

        #yes:hover {
            transform: scale(1.1);
        }

        #no {
            position: absolute;
            background: none;
            font-size: 22px;
        }

        #message {
            display: none;
            font-size: 24px;
            margin-top: 30px;
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            color: pink;
            font-size: 20px;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
                opacity: 1;
            }
            to {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <h1>Hey, wanna hang out this weekend? 💫</h1>
    <p>I promise it'll be fun 😄</p>

    <button id="yes">Yes 💖</button>
    <button id="no">🐦 No</button>

    <div id="message">Yayyy! I knew you'd say yes 🥹💖</div>

    <script>
        const noBtn = document.getElementById("no");
        const yesBtn = document.getElementById("yes");
        const message = document.getElementById("message");

        // No button runs away
        noBtn.addEventListener("mouseover", () => {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);

            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
            noBtn.style.transform = "rotate(" + (Math.random() * 360) + "deg)";
        });

        // Yes button click
        yesBtn.addEventListener("click", () => {
            message.style.display = "block";
        });

        // Floating hearts generator
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerText = "💖";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 500);
    </script>

</body>
</html>
